services:
  cappy-pocketbase:
    image: ghcr.io/muchobien/pocketbase:latest
    container_name: capy-pocketbase
    restart: unless-stopped
    # Host-only publish: Caddy (other compose) reaches PocketBase via host.docker.internal:8090
    # or via capy-network using reverse_proxy capy-pocketbase:8090
    ports:
      - "127.0.0.1:8090:8090"
    volumes:
      - ./pb_data:/pb/pb_data
      - ./pb_public:/pb/pb_public
      - ./pb_migrations:/pb/pb_migrations
    command:
      [
        "serve",
        "--http=0.0.0.0:8090",
        "--dir=/pb/pb_data",
        "--publicDir=/pb/pb_public",
        "--migrationsDir=/pb/pb_migrations",
      ]
    networks:
      - capy-network

networks:
  capy-network:
    external: true